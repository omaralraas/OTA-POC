name: OTA-POC Simulation CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Lint with ruff
      run: ruff check ota_poc/ tests/ scripts/

    - name: Type check with mypy
      run: mypy ota_poc/ scripts/

    - name: Security scan with bandit
      run: bandit -r ota_poc/ -ll

    - name: Run tests with coverage
      run: pytest tests/ -v --cov=ota_poc --cov-report=xml --cov-fail-under=75

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: matrix.python-version == '3.12'
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

    - name: Run smoke simulation (small fleet)
      if: matrix.python-version == '3.12'
      run: python -m ota_poc.metrics --runs 10 --fleet-size 1000 --ablation

    - name: Assert output CSVs
      if: matrix.python-version == '3.12'
      run: python scripts/assert_csvs.py
